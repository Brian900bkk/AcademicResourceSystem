<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Student Dashboard</h1>

        <!-- Upload Notes Section -->
        <section>
            <h2>Upload Notes</h2>
            <form id="uploadNotesForm" enctype="multipart/form-data">
                <input type="text" id="noteTitle" placeholder="Note Title" required>
                <input type="file" id="noteFile" required>
                <button type="submit">Upload</button>
            </form>
        </section>

        <!-- Search Resources Section -->
        <section>
            <h2>Search Resources</h2>
            <form id="searchForm">
                <input type="text" id="searchQuery" placeholder="Enter keyword..." required>
                <button type="submit">Search</button>
            </form>
            <div id="searchResults"></div>
        </section>

        <!-- Logout Link -->
        <p><a href="/login">Logout</a></p>
    </div>
    <div class="container">
        <h2>Search Notes</h2>
        <form id="searchForm">
            <input type="text" id="searchQuery" placeholder="Enter keyword..." required>
            <button type="submit">Search</button>
        </form>
        <div id="results"></div>
    </div>
    

    <script src="script.js"></script>
</body>
</html>
